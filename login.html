<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css">
  </head>
  <body>
    <section>
      <div class="container">
        <h1>Login</h1>
        
        <div class="input-group">
          <input type="email" placeholder="Enter Your Email" required />
          <label for="">Email</label>
        </div>
        <div class="input-group">
          <input type="password" placeholder="Enter Your Password" required />
          <label for="">Password </label>
        </div>
        <button class="res-button"><a href="output.html">Login</a></button>
        <div class="register">
         Don't have an account yet?
          <a href="#">
           Register now!<i class="fa-solid fa-square-up-right"></i
          ></a>
        </div>
        <div class="divider">or</div>
        <a class="social-link" href="https://www.google.com/chrome/"><img src="images/Google.png" alt="google" />Continue With Google</a>
        <a class="social-link" href="https://github.com/"> <img src="images/Github.png" alt="github" />Continue With Github</a>
      </div>
    </section>
  </body>
</html>
